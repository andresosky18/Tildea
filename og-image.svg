<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D47A1"/>
      <stop offset="50%" style="stop-color:#1976D2"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.04)"/>
    </linearGradient>
    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="rgba(255,255,255,0.12)"/>
    </pattern>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="-80" r="320" fill="rgba(255,255,255,0.06)"/>
  <circle cx="1100" cy="700" r="250" fill="rgba(255,255,255,0.04)"/>
  <circle cx="-60" cy="400" r="200" fill="rgba(255,255,255,0.05)"/>

  <!-- Logo icon -->
  <rect x="80" y="72" width="64" height="64" rx="16" fill="rgba(255,255,255,0.2)"/>
  <rect x="80" y="72" width="64" height="64" rx="16" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Waveform icon -->
  <path d="M95 108 Q105 95 115 108 Q125 121 135 104 L145 91" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Logo wordmark -->
  <text x="158" y="116" font-family="'Sora',sans-serif" font-size="40" font-weight="800" fill="white" letter-spacing="-1">tildea</text>
  <circle cx="197" cy="83" r="7" fill="#FF7043"/>

  <!-- Main headline -->
  <text x="80" y="260" font-family="'Sora',sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">Escribe perfecto</text>
  <text x="80" y="348" font-family="'Sora',sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">en cualquier sitio web</text>

  <!-- Subtitle -->
  <text x="80" y="418" font-family="'DM Sans',sans-serif" font-size="28" fill="rgba(255,255,255,0.8)" letter-spacing="0">Corrector ortográfico inteligente para español e inglés</text>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="80" y="470" width="220" height="48" rx="24" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="100" y="500" font-family="'DM Sans',sans-serif" font-size="20" fill="white">✓  WhatsApp Web</text>

  <!-- Pill 2 -->
  <rect x="318" y="470" width="180" height="48" rx="24" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="338" y="500" font-family="'DM Sans',sans-serif" font-size="20" fill="white">✓  Gmail</text>

  <!-- Pill 3 -->
  <rect x="516" y="470" width="230" height="48" rx="24" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="536" y="500" font-family="'DM Sans',sans-serif" font-size="20" fill="white">✓  Google Docs</text>

  <!-- Pill 4 -->
  <rect x="764" y="470" width="190" height="48" rx="24" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="784" y="500" font-family="'DM Sans',sans-serif" font-size="20" fill="white">✓  Gratis</text>

  <!-- Bottom badge -->
  <rect x="80" y="548" width="260" height="40" rx="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <circle cx="107" cy="568" r="7" fill="#4CAF50"/>
  <text x="124" y="574" font-family="'DM Sans',sans-serif" font-size="17" fill="rgba(255,255,255,0.85)">1,200+ usuarios activos</text>

  <!-- Domain -->
  <text x="1120" y="600" font-family="'DM Sans',sans-serif" font-size="20" fill="rgba(255,255,255,0.5)" text-anchor="end">tildea.vercel.app</text>
</svg>